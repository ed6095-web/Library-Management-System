services:
  - type: web
    name: library-management-backend
    runtime: java
    buildCommand: javac -cp "lib/*" -d out backend/src/*.java
    startCommand: java -cp "out:lib/*" backend.src.Main
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - key: DB_HOST
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        value: library_management
